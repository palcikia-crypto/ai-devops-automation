name: AI DevOps Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Code Review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const { execSync } = require('child_process');
            const diff = execSync('git diff origin/${{ github.base_ref }} HEAD').toString();
            
            if (!process.env.GEMINI_API_KEY) {
              console.log('GEMINI_API_KEY secret is missing. Skipping AI review.');
              return;
            }

            const prompt = "Ты — эксперт в DevOps и безопасности. Проанализируй следующий diff кода и дай краткий аудит на русском языке. Обрати внимание на: 1. Уязвимости (секреты в коде, инъекции). 2. Ошибки в Dockerfile/Terraform/K8s. 3. Оптимизацию CI/CD. \n\nDIFF:\n" + diff;

            try {
              const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=' + process.env.GEMINI_API_KEY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }]
                })
              });
              
              const data = await response.json();
              const reviewText = data.candidates[0].content.parts[0].text;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "### 🤖 AI DevOps Аудит\n\n" + reviewText
              });
            } catch (error) {
              console.error('Error calling Gemini API:', error);
            }
